- name: Example usage of journald
  hosts:
    - 127.0.0.1
  connection: local
  tasks:
    - name: Can configure journald using system.journald
      ansible.builtin.include_role:
        name: journald
      vars:
        configuration: "empty"
    - name: Can install ps1 using system.ps1
      ansible.builtin.include_role:
        name: ps1
