---
- name: Ensure base dependencies are present
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
- name: Configure Docker repository (RedHat family)
  when: ansible_facts['os_family'] == 'RedHat'
  block:
    - name: Add Docker YUM repository
      ansible.builtin.get_url:
        dest: /etc/yum.repos.d/docker-ce.repo
        url: https://download.docker.com/linux/centos/docker-ce.repo
        mode: '0644'
        owner: root
        group: root
- name: Configure Docker repository (Debian family)
  when: ansible_facts['os_family'] == 'Debian'
  block:
    - name: Ensure keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
        owner: root
        group: root
    - name: Download Docker official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        owner: root
        group: root
    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        filename: docker
        repo: >-
          deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }} 
          signed-by=/etc/apt/keyrings/docker.asc] 
          https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} 
          {{ ansible_facts['distribution_release'] }} stable
        state: present
        update_cache: true
